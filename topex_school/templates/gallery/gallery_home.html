{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h3>Gallery Albums</h3>
  <div class="row">
    {% for album in albums %}
      <div class="col-md-4 mb-3">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">{{ album.name }}</h5>
            <p class="card-text">{{ album.description|truncatewords:20 }}</p>
            <a href="{% url 'gallery:album_detail' album.id %}" class="btn btn-sm btn-outline-primary">View Album</a>
          </div>
        </div>
      </div>
    {% empty %}
      <p>No albums available yet.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
