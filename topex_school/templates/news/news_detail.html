{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
  <div class="card">
    {% if post.image %}
      <img src="{{ post.image.url }}" class="card-img-top" alt="{{ post.title }}">
    {% endif %}
    <div class="card-body">
      <h4 class="card-title">{{ post.title }}</h4>
      <p class="card-text">{{ post.content }}</p>
      <p class="text-muted small">By {{ post.author }} | {{ post.date_posted|date:"F d, Y" }}</p>
      <a href="{% url 'news:news_list' %}" class="btn btn-sm btn-secondary mt-3">← Back to News</a>
    </div>
  </div>
</div>
{% endblock %}
