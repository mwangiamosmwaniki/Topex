{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
  <h3 class="mb-4">Latest News</h3>
  {% for post in posts %}
    <div class="card mb-3">
      {% if post.image %}
        <img src="{{ post.image.url }}" class="card-img-top" alt="{{ post.title }}">
      {% endif %}
      <div class="card-body">
        <h5 class="card-title">{{ post.title }}</h5>
        <p class="card-text">{{ post.content|truncatewords:30 }}</p>
        <p class="text-muted small">Posted by {{ post.author }} on {{ post.date_posted|date:"F d, Y" }}</p>
        <a href="{% url 'news:news_detail' post.pk %}" class="btn btn-sm btn-outline-primary">Read More</a>
      </div>
    </div>
  {% endfor %}
</div>
{% endblock %}
