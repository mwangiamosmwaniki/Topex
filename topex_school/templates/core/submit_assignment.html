{% extends "core/students/base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm p-4">
        <h4 class="mb-3 text-primary">Submit Assignment: {{ assignment.title }}</h4>
        
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}
          
          <div class="mb-3">
            <label for="file" class="form-label">Upload File</label>
            <input type="file" name="file" id="file" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-success w-100">Submit Assignment</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
