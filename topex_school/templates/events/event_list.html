{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <div class="card">
    {% if event.banner %}
      <img src="{{ event.banner.url }}" class="card-img-top" alt="{{ event.title }}">
    {% endif %}
    <div class="card-body">
      <h4 class="card-title">{{ event.title }}</h4>
      <p class="card-text">{{ event.description }}</p>
      <p class="text-muted">📍 {{ event.location }} | 🗓 {{ event.start_date|date:"M d, Y H:i" }} to {{ event.end_date|date:"M d, Y H:i" }}</p>
      <a href="{% url 'events:event_list' %}" class="btn btn-sm btn-secondary mt-3">← Back to Events</a>
    </div>
  </div>
</div>
{% endblock %}
