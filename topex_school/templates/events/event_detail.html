{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h3 class="mb-4">Upcoming Events</h3>
  {% for event in events %}
    <div class="card mb-3">
      {% if event.banner %}
        <img src="{{ event.banner.url }}" class="card-img-top" alt="{{ event.title }}">
      {% endif %}
      <div class="card-body">
        <h5 class="card-title">{{ event.title }}</h5>
        <p class="card-text">{{ event.description|truncatewords:30 }}</p>
        <p class="text-muted">📍 {{ event.location }} | 🗓 {{ event.start_date|date:"M d, Y H:i" }}</p>
        <a href="{% url 'events:event_detail' event.pk %}" class="btn btn-sm btn-outline-primary">More Info</a>
      </div>
    </div>
  {% endfor %}
</div>
{% endblock %}
