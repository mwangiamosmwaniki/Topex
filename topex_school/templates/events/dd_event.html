{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h3>Create New Event</h3>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary mt-2">Save Event</button>
  </form>
</div>
{% endblock %}
