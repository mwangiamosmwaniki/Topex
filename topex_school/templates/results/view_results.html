{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
  <h3>All Results</h3>
  <table class="table table-striped table-bordered">
    <thead>
      <tr>
        <th>Applicant</th>
        <th>Course</th>
        <th>Unit</th>
        <th>Score</th>
        <th>Grade</th>
        <th>Semester</th>
        <th>Year</th>
      </tr>
    </thead>
    <tbody>
      {% for r in results %}
        <tr>
          <td>{{ r.applicant.full_name }}</td>
          <td>{{ r.course.name }}</td>
          <td>{{ r.unit_name }}</td>
          <td>{{ r.score }}</td>
          <td>{{ r.grade }}</td>
          <td>{{ r.semester }}</td>
          <td>{{ r.academic_year }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
