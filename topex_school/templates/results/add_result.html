{% extends 'base.html' %}
{% load form_tags %}

{% block content %}
<div class="container mt-5">
  <h3>Add Result</h3>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field|add_class:"form-control" }}
        {% if field.errors %}
          <div class="text-danger">{{ field.errors }}</div>
        {% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Save</button>
  </form>
</div>
{% endblock %}
